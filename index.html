<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>floaty eye thingies</title>
  <meta name="description" content="A browser game poem about the little floaty things inside your eyes." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="field" aria-label="A bright field of drifting eye floaters"></canvas>

  <div id="poem" class="poem">
    <p>look up at the light.</p>
    <p>there — the little drifting things.</p>
    <p>try to see them, really see them,</p>
    <p>and watch how they slip away.</p>
    <p class="hint">(move your gaze. they will never quite let you.)</p>
  </div>

  <script src="main.js"></script>
</body>
</html>
