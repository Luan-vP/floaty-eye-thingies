<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="85%">
      <stop offset="0%"   stop-color="#fbfdff"/>
      <stop offset="55%"  stop-color="#eef2f5"/>
      <stop offset="100%" stop-color="#dfe5ea"/>
    </radialGradient>
    <radialGradient id="bead">
      <stop offset="0%"   stop-color="rgb(70,80,92)" stop-opacity="0.9"/>
      <stop offset="60%"  stop-color="rgb(70,80,92)" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="rgb(70,80,92)" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g filter="url(#soft)">
    <!-- strand -->
    <g transform="translate(360 230) rotate(18)" opacity="0.55">
      <circle r="14" fill="url(#bead)"/>
      <circle cx="26"  cy="8"   r="11" fill="url(#bead)"/>
      <circle cx="50"  cy="18"  r="12" fill="url(#bead)"/>
      <circle cx="74"  cy="24"  r="10" fill="url(#bead)"/>
      <circle cx="98"  cy="28"  r="9"  fill="url(#bead)"/>
    </g>
    <!-- cluster -->
    <g transform="translate(820 180)" opacity="0.6">
      <circle r="16" fill="url(#bead)"/>
      <circle cx="22"  cy="10"  r="12" fill="url(#bead)"/>
      <circle cx="-14" cy="16"  r="11" fill="url(#bead)"/>
      <circle cx="10"  cy="-18" r="10" fill="url(#bead)"/>
      <circle cx="-22" cy="-10" r="9"  fill="url(#bead)"/>
    </g>
    <!-- ring -->
    <g transform="translate(580 410)" opacity="0.45">
      <circle cx="0"   cy="-22" r="5" fill="url(#bead)"/>
      <circle cx="16"  cy="-16" r="5" fill="url(#bead)"/>
      <circle cx="22"  cy="0"   r="5" fill="url(#bead)"/>
      <circle cx="16"  cy="16"  r="5" fill="url(#bead)"/>
      <circle cx="0"   cy="22"  r="5" fill="url(#bead)"/>
      <circle cx="-16" cy="16"  r="5" fill="url(#bead)"/>
      <circle cx="-22" cy="0"   r="5" fill="url(#bead)"/>
      <circle cx="-16" cy="-16" r="5" fill="url(#bead)"/>
    </g>
    <!-- blob -->
    <g transform="translate(220 380)" opacity="0.5">
      <circle r="20" fill="url(#bead)"/>
      <circle cx="10" cy="6" r="9" fill="url(#bead)"/>
    </g>
  </g>

  <text x="80" y="540" font-family="Georgia, 'Times New Roman', serif"
        font-size="64" fill="rgb(60,70,80)" fill-opacity="0.75">
    floaty eye thingies
  </text>
  <text x="80" y="582" font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="26" fill="rgb(60,70,80)" fill-opacity="0.45">
    a browser game poem
  </text>
</svg>
